<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook Story Clone</title>
  <!-- Google Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin-top: 70px;
      background-color: black;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 60px;
      background-color: #242526;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 1000;
    }

    .logo {
      width: 40px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-bar {
      background-color: #3a3b3c;
      border: none;
      border-radius: 20px;
      padding: 8px 12px;
      color: white;
      outline: none;
      font-size: 14px;
      width: 180px;
    }

    .search-bar::placeholder {
      color: #b0b3b8;
    }

    .nav-centre {
      display: flex;
      gap: 25px;
    }

    .nav-icon {
      font-size: 28px;
      padding: 8px 40px;
      border-radius: 10px;
      color: #b0b3b8;
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav-icon:hover {
      background-color: #3a3b3c;
      color: #e4e6eb;
    }

    .nav-right {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-right: 3px;
    }

    .circle-icon {
      background-color: #3a3b3c;
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 22px;
      color: #e4e6eb;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .story-section {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .story-container {
      display: flex;
      gap: 16px;
      padding: 20px;
      background-color: #242526;
      border-radius: 12px;
      max-width: 850px;
      width: 100%;
      justify-content: center;
    }

    .story {
      width: 120px;
      height: 200px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .story:hover {
      transform: scale(1.03);
    }

    .story-main-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .story-profile {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid #1877f2;
      object-fit: cover;
    }

    .story-user {
      position: absolute;
      left: 10px;
      bottom: 10px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    /* Material Icons fix */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">

    <div class="nav-left">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg"
           class="logo" alt="Facebook logo">
      <input type="text" class="search-bar" placeholder="Search Facebook">
    </div>

    <div class="nav-centre">
      <span class="material-symbols-outlined nav-icon">home</span>
      <span class="material-symbols-outlined nav-icon">live_tv</span>
      <span class="material-symbols-outlined nav-icon">storefront</span>
      <span class="material-symbols-outlined nav-icon">group</span>
    </div>

    <div class="nav-right">
      <span class="material-symbols-outlined circle-icon">add</span>
      <span class="material-symbols-outlined circle-icon">notifications</span>
      <span class="material-symbols-outlined circle-icon">chat</span>
    </div>

  </div>

  <!-- STORY SECTION -->
  <div class="story-section">
    <div class="story-container">

      <div class="story">
        <img src="https://images.pexels.com/photos/220453/pexels-photo-220453.jpeg" alt="Story background" class="story-main-img">
        <img src="https://images.pexels.com/photos/415829/pexels-photo-415829.jpeg" alt="Profile" class="story-profile">
        <div class="story-user">Your Story</div>
      </div>

      <div class="story">
        <img src="https://images.pexels.com/photos/614810/pexels-photo-614810.jpeg" alt="Story background" class="story-main-img">
        <img src="https://images.pexels.com/photos/774909/pexels-photo-774909.jpeg" alt="Profile" class="story-profile">
        <div class="story-user">Alex</div>
      </div>

      <div class="story">
        <img src="https://images.pexels.com/photos/91227/pexels-photo-91227.jpeg" alt="Story background" class="story-main-img">
        <img src="https://images.pexels.com/photos/415829/pexels-photo-415829.jpeg" alt="Profile" class="story-profile">
        <div class="story-user">Emma</div>
      </div>

    </div>
  </div>

</body>
</html>
